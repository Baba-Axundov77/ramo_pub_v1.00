# ═══════════════════════════════════════════════════════════════
# RAMO PUB - SITE CONFIGURATION
# SSL Termination, Load Balancing, Caching
# ═══════════════════════════════════════════════════════════════

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name ramo-pub.com www.ramo-pub.com localhost;
    
    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    server_name ramo-pub.com www.ramo-pub.com localhost;
    
    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # SSL trust chain
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    
    # Root directory
    root /var/www;
    index index.html index.htm;
    
    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    # Security headers for specific endpoints
    location /api/ {
        # Rate limiting for API
        limit_req zone=api burst=20 nodelay;
        
        # Proxy to Flask application
        proxy_pass http://ramo_pub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Cache bypass for API
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
    
    # WebSocket endpoint
    location /ws/ {
        proxy_pass http://ramo_pub_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # Login endpoint (stricter rate limiting)
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        
        proxy_pass http://ramo_pub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # File upload endpoint (strict rate limiting)
    location /api/upload {
        limit_req zone=upload burst=2 nodelay;
        
        proxy_pass http://ramo_pub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Upload specific settings
        client_max_body_size 50M;
        proxy_request_buffering off;
    }
    
    # Static files with caching
    location /static/ {
        alias /var/www/static/;
        
        # Cache static files
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
        
        # Gzip compression
        gzip_static on;
        
        # Security for sensitive files
        location ~* \.(env|log|conf|key|pem)$ {
            deny all;
            return 404;
        }
    }
    
    # Uploads directory
    location /uploads/ {
        alias /var/www/uploads/;
        
        # Cache uploaded files
        expires 30d;
        add_header Cache-Control "public";
        
        # Security - prevent directory listing
        autoindex off;
        
        # Only allow specific file types
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|doc|docx|xls|xlsx)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
        
        # Deny access to sensitive files
        location ~* \.(env|log|conf|key|pem|sql|backup)$ {
            deny all;
            return 404;
        }
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Monitoring endpoints (restricted access)
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.20.0.0/16;  # Docker network
        deny all;
    }
    
    # Block common attacks
    location ~* \.(aspx|php|jsp|cgi)$ {
        deny all;
        return 404;
    }
    
    # Block suspicious user agents
    if ($http_user_agent ~* (bot|crawler|spider|scraper)) {
        return 403;
    }
    
    # Custom error pages
    location = /404.html {
        root /var/www/error;
        internal;
    }
    
    location = /50x.html {
        root /var/www/error;
        internal;
    }
}

# ═══════════════════════════════════════════════════════════════
# BLUE-GREEN DEPLOYMENT CONFIGURATION
# ═══════════════════════════════════════════════════════════════

# Green environment (for blue-green deployment)
upstream ramo_pub_green {
    least_conn;
    server web-green:5001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Switch to green environment (uncomment during deployment)
# upstream ramo_pub_backend {
#     least_conn;
#     server web-green:5001 max_fails=3 fail_timeout=30s;
#     server web:5000 max_fails=3 fail_timeout=30s backup;
#     keepalive 32;
# }

# Maintenance page (for deployments)
server {
    listen 80;
    listen 443 ssl http2;
    server_name ramo-pub.com www.ramo-pub.com localhost;
    
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    root /var/www/maintenance;
    index maintenance.html;
    
    # Allow health checks during maintenance
    location /health {
        access_log off;
        return 200 "maintenance\n";
        add_header Content-Type text/plain;
    }
    
    # Allow Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Show maintenance page for all other requests
    location / {
        try_files /maintenance.html =503;
    }
    
    error_page 503 @maintenance;
    
    location @maintenance {
        rewrite ^(.*)$ /maintenance.html break;
    }
}

