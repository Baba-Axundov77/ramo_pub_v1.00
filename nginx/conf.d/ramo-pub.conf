# LOAD TESTING CONFIGURATION (for staging)
# ═══════════════════════════════════════════════════════════════

# Load balancer for stress testing
upstream ramo_pub_load_test {
    least_conn;
    server web:5000 weight=1 max_fails=3 fail_timeout=30s;
    # Add more instances for load testing
    # server web-2:5000 weight=1 max_fails=3 fail_timeout=30s;
    # server web-3:5000 weight=1 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
}

