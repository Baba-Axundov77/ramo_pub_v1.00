{% extends "base.html" %}
{% block title %}Mətbəx Ekranı (KDS){% endblock %}

{% block content %}
<div class="kds-container">
  <!-- KDS Header -->
  <header class="kds-header">
    <h1 class="kds-title">MƏTBƏX EKRANI</h1>
    <div class="kds-stats">
      <div class="kds-stat">
        <span class="kds-stat-value" id="activeOrders">0</span>
        <span class="kds-stat-label">Aktiv Sifariş</span>
      </div>
      <div class="kds-stat">
        <span class="kds-stat-value" id="waitingOrders">0</span>
        <span class="kds-stat-label">Gözləyən</span>
      </div>
      <div class="kds-stat">
        <span class="kds-stat-value" id="delayedOrders">0</span>
        <span class="kds-stat-label">Gecikən</span>
      </div>
      <div class="kds-stat">
        <span class="kds-stat-value" id="connectionStatus">🟢</span>
        <span class="kds-stat-label">Bağlantı</span>
      </div>
    </div>
  </header>

  <!-- Kitchen Totals Summary Bar -->
  <div class="kds-summary-bar" id="kdsSummaryBar">
    <div class="summary-title">Mətbəx Cəmi</div>
    <div class="summary-items" id="summaryItems">
      <!-- Items will be dynamically calculated -->
    </div>
  </div>

  <!-- KDS Grid Layout -->
  <main class="kds-grid" id="kdsGrid">
    <!-- Order cards will be dynamically loaded here -->
  </main>

  <!-- KDS Quick Action Buttons -->
  <div class="kds-quick-actions">
    <button class="kds-action-btn primary" onclick="markAllReady()">
      <span>✓</span>
      <span>Hamısını Hazırla</span>
    </button>
    <button class="kds-action-btn danger" onclick="returnAllOrders()">
      <span>↩</span>
      <span>Geri Qaytar</span>
    </button>
    <button class="kds-action-btn" onclick="printOrders()">
      <span>🖨️</span>
      <span>Çap Et</span>
    </button>
  </div>
</div>

<!-- Luxury Notification -->
<div class="luxury-notification" id="luxuryNotification">
  <span id="notificationText">Masa 5 - Sifariş Hazırdır!</span>
</div>

<!-- Offline Warning -->
<div class="kds-offline-warning" id="offlineWarning">
  ⚠️ Bağlantı Kəsilib - Offline Rejim
</div>

{% endblock %}

{% block extra_js %}
<script>
class LuxuryKDS {
  constructor() {
    this.orders = [];
    this.ws = null;
    this.timers = new Map();
    this.soundEnabled = true;
    this.isOnline = true;
    this.offlineQueue = [];
    this.dbName = 'ramo_kds_offline';
    this.dbVersion = 1;
    this.db = null;
    this.init();
  }
  
  async init() {
    await this.initIndexedDB();
    this.initWebSocket();
    this.loadSampleOrders();
    this.startTimers();
    this.updateStats();
    this.updateKitchenTotals();
    this.initSoundEffects();
    this.loadOfflineOrders();
  }
  
  // IndexedDB for Offline Persistence
  async initIndexedDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(this.dbName, this.dbVersion);
      
      request.onerror = () => {
        console.error('IndexedDB failed to open');
        reject();
      };
      
      request.onsuccess = () => {
        this.db = request.result;
        console.log('IndexedDB initialized');
        resolve();
      };
      
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        
        // Create orders store
        if (!db.objectStoreNames.contains('orders')) {
          const orderStore = db.createObjectStore('orders', { keyPath: 'id' });
          orderStore.createIndex('status', 'status', { unique: false });
          orderStore.createIndex('created_at', 'created_at', { unique: false });
        }
        
        // Create analytics store
        if (!db.objectStoreNames.contains('analytics')) {
          const analyticsStore = db.createObjectStore('analytics', { keyPath: 'id', autoIncrement: true });
          analyticsStore.createIndex('order_id', 'order_id', { unique: false });
          analyticsStore.createIndex('completion_time', 'completion_time', { unique: false });
        }
      };
    });
  }
  
  // Save order to IndexedDB
  async saveOrderToDB(order) {
    if (!this.db) return;
    
    const transaction = this.db.transaction(['orders'], 'readwrite');
    const store = transaction.objectStore('orders');
    store.put(order);
    
    return new Promise((resolve, reject) => {
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject();
    });
  }
  
  // Remove order from IndexedDB
  async removeOrderFromDB(orderId) {
    if (!this.db) return;
    
    const transaction = this.db.transaction(['orders'], 'readwrite');
    const store = transaction.objectStore('orders');
    store.delete(orderId);
    
    return new Promise((resolve, reject) => {
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject();
    });
  }
  
  // Load offline orders from IndexedDB
  async loadOfflineOrders() {
    if (!this.db) return;
    
    const transaction = this.db.transaction(['orders'], 'readonly');
    const store = transaction.objectStore('orders');
    const request = store.getAll();
    
    request.onsuccess = () => {
      const offlineOrders = request.result;
      if (offlineOrders.length > 0 && this.isOnline) {
        // Sync offline orders when coming back online
        offlineOrders.forEach(order => {
          if (!this.orders.find(o => o.id === order.id)) {
            this.orders.push(order);
            this.renderOrder(order);
          }
        });
        this.updateStats();
        this.updateKitchenTotals();
        
        // Clear synced orders
        const clearTransaction = this.db.transaction(['orders'], 'readwrite');
        const clearStore = clearTransaction.objectStore('orders');
        clearStore.clear();
      } else if (!this.isOnline && offlineOrders.length > 0) {
        // Load offline orders when offline
        this.orders = offlineOrders;
        this.orders.forEach(order => this.renderOrder(order));
        this.updateStats();
        this.updateKitchenTotals();
      }
    };
  }
  
  // Save analytics data
  async saveAnalytics(orderData, completionTime) {
    if (!this.db) return;
    
    const analyticsData = {
      order_id: orderData.id,
      table_number: orderData.table_number,
      start_time: orderData.created_at,
      end_time: new Date().toISOString(),
      completion_time: completionTime, // in seconds
      items_count: orderData.items.length,
      priority: orderData.priority,
      timestamp: new Date().toISOString()
    };
    
    const transaction = this.db.transaction(['analytics'], 'readwrite');
    const store = transaction.objectStore('analytics');
    store.add(analyticsData);
    
    // Also send to server if online
    if (this.isOnline && this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify({
        type: 'order_analytics',
        data: analyticsData
      }));
    }
  }
  
  // WebSocket Connection
  initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws/kds`;
    
    this.ws = new WebSocket(wsUrl);
    
    this.ws.onopen = () => {
      console.log('KDS WebSocket connected');
      this.isOnline = true;
      this.updateConnectionStatus('online');
      this.showNotification('Mətbəx sistemi qoşuldu', 'success');
      
      // Process offline queue
      this.processOfflineQueue();
    };
    
    this.ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      this.handleWebSocketMessage(data);
    };
    
    this.ws.onclose = () => {
      console.log('KDS WebSocket disconnected');
      this.isOnline = false;
      this.updateConnectionStatus('offline');
      this.showOfflineWarning();
      setTimeout(() => this.initWebSocket(), 5000); // Reconnect
    };
    
    this.ws.onerror = (error) => {
      console.error('KDS WebSocket error:', error);
      this.isOnline = false;
      this.updateConnectionStatus('reconnecting');
    };
  }
  
  handleWebSocketMessage(data) {
    switch (data.type) {
      case 'new_order':
        this.addOrder(data.order);
        break;
      case 'order_update':
        this.updateOrder(data.order_id, data.order);
        break;
      case 'order_cancelled':
        this.removeOrder(data.order_id);
        break;
      case 'priority_update':
        this.updatePriority(data.order_id, data.priority);
        break;
    }
  }
  
  // Update connection status
  updateConnectionStatus(status) {
    const statusElement = document.getElementById('connectionStatus');
    const offlineWarning = document.getElementById('offlineWarning');
    
    switch (status) {
      case 'online':
        statusElement.textContent = '🟢';
        statusElement.className = '';
        offlineWarning.classList.remove('show');
        break;
      case 'offline':
        statusElement.textContent = '🔴';
        statusElement.className = 'connection-offline';
        offlineWarning.classList.add('show');
        break;
      case 'reconnecting':
        statusElement.textContent = '🟡';
        statusElement.className = 'connection-reconnecting';
        break;
    }
  }
  
  // Show offline warning
  showOfflineWarning() {
    this.showNotification('Bağlantı kəsilib - Offline rejimə keçildi', 'warning');
  }
  
  // Process offline queue
  async processOfflineQueue() {
    while (this.offlineQueue.length > 0 && this.isOnline) {
      const message = this.offlineQueue.shift();
      if (this.ws && this.ws.readyState === WebSocket.OPEN) {
        this.ws.send(JSON.stringify(message));
      }
    }
  }
  
  // Add to offline queue
  addToOfflineQueue(message) {
    this.offlineQueue.push(message);
  }
  
  // Kitchen Totals Calculation
  updateKitchenTotals() {
    const summaryItems = document.getElementById('summaryItems');
    if (!summaryItems) return;
    
    // Calculate totals for all active orders
    const itemTotals = {};
    
    this.orders.forEach(order => {
      order.items.forEach(item => {
        const key = item.name;
        if (!itemTotals[key]) {
          itemTotals[key] = {
            name: item.name,
            quantity: 0,
            emoji: this.getItemEmoji(item.name)
          };
        }
        itemTotals[key].quantity += item.quantity;
      });
    });
    
    // Sort by quantity (descending)
    const sortedItems = Object.values(itemTotals)
      .sort((a, b) => b.quantity - a.quantity)
      .slice(0, 8); // Show top 8 items
    
    // Render summary
    summaryItems.innerHTML = sortedItems.map(item => `
      <div class="summary-item">
        <span class="summary-item-emoji">${item.emoji}</span>
        <span class="summary-item-count">${item.quantity}</span>
      </div>
    `).join('');
    
    // Update grid info
    const gridInfo = document.getElementById('gridInfo');
    if (gridInfo) {
      gridInfo.textContent = `${sortedItems.length} items`;
    }
  }
  
  // Get item emoji based on name
  getItemEmoji(itemName) {
    const emojiMap = {
      'Pizza': '🍕',
      'Burger': '🍔',
      'Salad': '🥗',
      'Şərab': '🍷',
      'Bira': '🍺',
      'Qəhvə': '☕',
      'Tiramisu': '🍰',
      'Lahmacun': '🫓',
      'Çeşburger': '🍔',
      'Sezar Salatı': '🥗',
      'Qırmızı Şərab': '🍷',
      'Lüks Burger': '🍔',
      'Pizza Margherita': '🍕'
    };
    
    for (const [key, emoji] of Object.entries(emojiMap)) {
      if (itemName.toLowerCase().includes(key.toLowerCase())) {
        return emoji;
      }
    }
    
    return '🍽️'; // Default emoji
  }
  
  // Add Order
  async addOrder(order) {
    if (this.orders.find(o => o.id === order.id)) {
      return;
    }
    
    // Add timestamp for analytics
    order.start_time = order.created_at;
    
    this.orders.push(order);
    this.renderOrder(order);
    this.updateStats();
    this.updateKitchenTotals();
    
    // Save to IndexedDB for offline persistence
    await this.saveOrderToDB(order);
    
    // Play sound for new order
    this.playSound('new_order');
    
    // Start timer
    this.startTimer(order.id, order.created_at);
    
    // Show notification for priority orders
    if (order.priority) {
      this.showNotification(`⭐ Prioritet Masa ${order.table_number} - Yeni sifariş!`, 'priority');
    }
  }
  
  // Render Order Card
  renderOrder(order) {
    const grid = document.getElementById('kdsGrid');
    
    // Priority orders go first
    const insertPosition = order.priority ? 0 : grid.children.length;
    
    const orderCard = document.createElement('div');
    orderCard.className = `order-card ${this.getStatusClass(order)}`;
    orderCard.id = `order-${order.id}`;
    
    if (order.priority) {
      orderCard.classList.add('priority');
    }
    
    orderCard.innerHTML = `
      ${order.priority ? '<div class="priority-indicator"></div>' : ''}
      <div class="order-header">
        <div class="order-table-info">
          <div class="order-table-number">MASA ${order.table_number}</div>
          <div class="order-waiter">${order.waiter_name}</div>
        </div>
        <div class="order-timer" id="timer-${order.id}">00:00</div>
      </div>
      <div class="order-items">
        ${order.items.map(item => `
          <div class="order-item">
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              ${item.modifiers.length > 0 ? 
                `<div class="item-modifiers">${item.modifiers.join(', ')}</div>` : ''}
            </div>
            <div class="item-quantity">×${item.quantity}</div>
          </div>
        `).join('')}
        ${order.notes ? `<div class="item-notes">📝 ${order.notes}</div>` : ''}
      </div>
      <div class="order-footer">
        <div class="order-time">${new Date(order.created_at).toLocaleTimeString('az-AZ')}</div>
        <div class="order-actions">
          <button class="order-done-btn" onclick="luxuryKDS.markOrderDone(${order.id})">
            HAZIR
          </button>
        </div>
      </div>
    `;
    
    // Insert at correct position
    if (insertPosition === 0 && grid.firstChild) {
      grid.insertBefore(orderCard, grid.firstChild);
    } else {
      grid.appendChild(orderCard);
    }
  }
  
  // Get Status Class
  getStatusClass(order) {
    const elapsed = (Date.now() - new Date(order.created_at).getTime()) / 60000; // minutes
    
    if (elapsed <= 5) return 'new-order';
    if (elapsed <= 15) return 'waiting';
    return 'delayed';
  }
  
  // Timer Management
  startTimer(orderId, createdAt) {
    const updateTimer = () => {
      const elapsed = Math.floor((Date.now() - new Date(createdAt).getTime()) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      const timerElement = document.getElementById(`timer-${orderId}`);
      
      if (timerElement) {
        timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        // Update status based on time
        const orderCard = document.getElementById(`order-${orderId}`);
        if (orderCard) {
          const newStatusClass = this.getStatusClass({ created_at: createdAt });
          if (!orderCard.classList.contains(newStatusClass)) {
            orderCard.className = orderCard.className.replace(/new-order|waiting|delayed/g, newStatusClass);
            this.updateStats();
          }
        }
      }
      
      // Update every second
      this.timers.set(orderId, setTimeout(updateTimer, 1000));
    };
    
    updateTimer();
  }
  
  startTimers() {
    // Start timers for all existing orders
    this.orders.forEach(order => {
      this.startTimer(order.id, order.created_at);
    });
  }
  
  // Mark Order Done
  async markOrderDone(orderId) {
    const order = this.orders.find(o => o.id === orderId);
    if (!order) return;
    
    // Calculate completion time for analytics
    const startTime = new Date(order.created_at);
    const endTime = new Date();
    const completionTime = Math.floor((endTime - startTime) / 1000); // seconds
    
    // Save analytics data
    await this.saveAnalytics(order, completionTime);
    
    // Send WebSocket message
    if (this.isOnline && this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify({
        type: 'order_ready',
        order_id: orderId,
        table_number: order.table_number,
        waiter_name: order.waiter_name,
        completion_time: completionTime
      }));
    } else {
      // Add to offline queue
      this.addToOfflineQueue({
        type: 'order_ready',
        order_id: orderId,
        table_number: order.table_number,
        waiter_name: order.waiter_name,
        completion_time: completionTime
      });
    }
    
    // Show luxury notification
    this.showNotification(`Masa ${order.table_number} - Sifariş Hazırdır!`, 'success');
    
    // Play success sound
    this.playSound('success');
    
    // Remove order with animation
    this.removeOrderWithAnimation(orderId);
  }
  
  // Remove Order
  async removeOrder(orderId) {
    const orderCard = document.getElementById(`order-${orderId}`);
    if (orderCard) {
      orderCard.remove();
    }
    
    // Clear timer
    const timer = this.timers.get(orderId);
    if (timer) {
      clearTimeout(timer);
      this.timers.delete(orderId);
    }
    
    // Remove from IndexedDB
    await this.removeOrderFromDB(orderId);
    
    // Remove from orders array
    this.orders = this.orders.filter(o => o.id !== orderId);
    this.updateStats();
    this.updateKitchenTotals();
  }
  
  // Remove Order with Animation
  removeOrderWithAnimation(orderId) {
    const orderCard = document.getElementById(`order-${orderId}`);
    if (orderCard) {
      orderCard.style.transform = 'scale(0.9)';
      orderCard.style.opacity = '0.5';
      
      setTimeout(() => {
        this.removeOrder(orderId);
      }, 300);
    }
  }
  
  // Update Statistics
  updateStats() {
    const activeOrders = this.orders.length;
    const waitingOrders = this.orders.filter(o => this.getStatusClass(o) === 'waiting').length;
    const delayedOrders = this.orders.filter(o => this.getStatusClass(o) === 'delayed').length;
    
    document.getElementById('activeOrders').textContent = activeOrders;
    document.getElementById('waitingOrders').textContent = waitingOrders;
    document.getElementById('delayedOrders').textContent = delayedOrders;
  }
  
  // Quick Actions
  markAllReady() {
    const activeOrders = [...this.orders];
    activeOrders.forEach((order, index) => {
      setTimeout(() => {
        this.markOrderDone(order.id);
      }, index * 500); // Stagger the notifications
    });
  }
  
  returnAllOrders() {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify({
        type: 'return_all_orders'
      }));
    }
    
    this.showNotification('Bütün sifarişlər geri qaytarıldı', 'info');
    this.playSound('info');
  }
  
  printOrders() {
    window.print();
    this.playSound('print');
  }
  
  // Luxury Notification System
  showNotification(message, type = 'success') {
    const notification = document.getElementById('luxuryNotification');
    const notificationText = document.getElementById('notificationText');
    
    notificationText.textContent = message;
    notification.classList.add('active');
    
    // Haptic feedback if available
    if ('vibrate' in navigator) {
      navigator.vibrate(20); // 20ms haptic feedback
    }
    
    // Auto-hide after 3 seconds
    setTimeout(() => {
      notification.classList.remove('active');
    }, 3000);
  }
  
  // Sound Effects
  initSoundEffects() {
    // Create audio context for luxury sounds
    this.audioContext = null;
    
    try {
      window.AudioContext = window.AudioContext || window.webkitAudioContext;
      this.audioContext = new AudioContext();
    } catch (e) {
      console.log('Audio context not available');
    }
  }
  
  playSound(type) {
    if (!this.soundEnabled || !this.audioContext) return;
    
    const oscillator = this.audioContext.createOscillator();
    const gainNode = this.audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(this.audioContext.destination);
    
    switch (type) {
      case 'new_order':
        oscillator.frequency.value = 800; // Higher pitch for new orders
        gainNode.gain.value = 0.1;
        break;
      case 'success':
        oscillator.frequency.value = 1200; // Success sound
        gainNode.gain.value = 0.15;
        break;
      case 'info':
        oscillator.frequency.value = 600; // Info sound
        gainNode.gain.value = 0.08;
        break;
      case 'print':
        oscillator.frequency.value = 400; // Print sound
        gainNode.gain.value = 0.05;
        break;
    }
    
    oscillator.start();
    oscillator.stop(this.audioContext.currentTime + 0.1);
  }
  
  // Priority System
  updatePriority(orderId, isPriority) {
    const order = this.orders.find(o => o.id === orderId);
    if (!order) return;
    
    order.priority = isPriority;
    
    // Re-render order
    const orderCard = document.getElementById(`order-${orderId}`);
    if (orderCard) {
      orderCard.remove();
    }
    
    this.renderOrder(order);
    
    if (isPriority) {
      this.showNotification(`⭐ Masa ${order.table_number} prioritet edildi`, 'priority');
    }
  }
}

// Global functions
window.markAllReady = function() {
  window.luxuryKDS.markAllReady();
};

window.returnAllOrders = function() {
  window.luxuryKDS.returnAllOrders();
};

window.printOrders = function() {
  window.luxuryKDS.printOrders();
};

// Initialize KDS
document.addEventListener('DOMContentLoaded', () => {
  window.luxuryKDS = new LuxuryKDS();
});

// Add print styles
const printStyles = document.createElement('style');
printStyles.textContent = `
  @media print {
    body {
      background: white !important;
      color: black !important;
    }
    
    .kds-header,
    .kds-quick-actions,
    .luxury-notification {
      display: none !important;
    }
    
    .kds-grid {
      grid-template-columns: repeat(3, 1fr) !important;
      gap: 1rem !important;
    }
    
    .order-card {
      break-inside: avoid !important;
      border: 1px solid #000 !important;
      background: white !important;
      color: black !important;
      page-break-inside: avoid;
    }
    
    .priority-indicator {
      display: none !important;
    }
  }
`;
document.head.appendChild(printStyles);
</script>
{% endblock %}
